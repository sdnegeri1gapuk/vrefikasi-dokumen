<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Dokumen Digital - SDN 1 Gapuk</title>
<style>
  :root{
    --blue:#1d6fd9;
    --green:#1f9d55;
    --ink:#222831;
    --sub:#5b6470;
    --line:#e4e7ec;
    --bg:#f2f4f7;
    --footer-bg:#f6f7f9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:"Segoe UI", Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    padding:32px 16px;
    color:var(--ink);
  }
  .outer{
    width:100%;
    max-width:560px;
    background:#fff;
    border-radius:20px;
    padding:16px;
    box-shadow:0 2px 10px rgba(20,20,30,0.05);
  }
  .card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:36px 32px 30px;
  }
  .logo{
    display:block;
    width:96px;
    height:96px;
    margin:0 auto 18px;
    border-radius:50%;
    object-fit:cover;
  }
  .logo-fallback{
    width:96px;height:96px;margin:0 auto 18px;border-radius:50%;
    background:linear-gradient(160deg,#2a8fd8,#1c5aa8);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;text-align:center;line-height:1.3;
  }
  h1{
    text-align:center;
    color:var(--blue);
    font-size:1.5rem;
    letter-spacing:.3px;
    margin:0 0 10px;
  }
  .status-line{
    text-align:center;
    color:var(--green);
    font-weight:700;
    font-size:1.15rem;
    margin:0 0 16px;
  }
  .desc{
    text-align:center;
    color:var(--sub);
    font-size:.95rem;
    line-height:1.6;
    max-width:420px;
    margin:0 auto 26px;
  }
  hr{
    border:none;
    border-top:1px solid var(--line);
    margin:0 0 26px;
  }
  .signer{
    background:var(--footer-bg);
    border-radius:10px;
    padding:20px 20px;
    text-align:center;
  }
  .signer .pre{ color:var(--sub); font-size:.92rem; margin-bottom:8px; }
  .signer .name{ color:var(--blue); font-weight:700; font-size:1.1rem; }
  .signer .role{ font-size:.94rem; margin-top:2px; }
  .signer .place{ color:var(--sub); font-size:.88rem; margin-top:10px; }
  @media (max-width:480px){
    .card{ padding:26px 18px 24px; }
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="card">
      <img class="logo" src="logo.png" alt="Logo Sekolah"
           onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logo-fallback',innerText:'SDN 1\nGAPUK'}))">

      <h1>VERIFIKASI DOKUMEN DIGITAL</h1>
      <div class="status-line">✅ DOKUMEN TELAH DISAHKAN</div>
      <p class="desc">
        Dokumen ini telah ditandatangani secara elektronik dan dinyatakan <b>SAH</b> oleh Kepala SD Negeri 1 Gapuk.
      </p>
      <hr>

      <div class="signer">
        <div class="pre">Dokumen ini telah disahkan oleh:</div>
        <div class="name">H. Masrun, S.Pd.</div>
        <div class="role">Kepala SD Negeri 1 Gapuk</div>
        <div class="place">Suralaga, Lombok Timur</div>
      </div>
    </div>
  </div>
</body>
</html>
